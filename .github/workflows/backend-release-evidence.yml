name: Backend release evidence

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Full 40-character commit SHA to build and attest
        required: true
        type: string

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate immutable input
        shell: bash
        run: |
          if [[ ! "${{ inputs.git_ref }}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "git_ref must be a full 40-character commit SHA" >&2
            exit 1
          fi

      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.git_ref }}
          persist-credentials: false

      - name: Verify checked-out identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ inputs.git_ref }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install evidence tools
        run: python -m pip install --requirement requirements-dev.txt

      - name: Build exact backend image
        run: docker build --pull=false --tag enai-backend:${{ inputs.git_ref }} .

      - name: Verify non-root runtime and excluded artifacts
        shell: bash
        run: |
          test "$(docker run --rm --entrypoint id enai-backend:${{ inputs.git_ref }} -u)" != "0"
          docker run --rm --entrypoint sh enai-backend:${{ inputs.git_ref }} -c \
            'test ! -e /app/.git && test ! -e /app/.env && test ! -e /app/tests && test ! -e /app/docs && test ! -e /app/requirements-dev.txt'

      - name: Prepare evidence directory
        run: mkdir -p artifacts

      - name: Create SBOM
        run: cyclonedx-py requirements requirements.txt --output-format JSON --output-file artifacts/backend-sbom.cdx.json

      - name: Audit production dependencies
        run: pip-audit --requirement requirements.txt --format json --output artifacts/backend-pip-audit.json

      - name: Create release manifest and image archive
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts
          if docker image inspect enai-backend:${{ inputs.git_ref }} >/dev/null 2>&1; then
            image_id="$(docker image inspect --format '{{.Id}}' enai-backend:${{ inputs.git_ref }})"
            python scripts/build_backend_release_manifest.py \
              --git-sha "${{ inputs.git_ref }}" \
              --image-id "$image_id" \
              --output artifacts/backend-release-manifest.json
            docker save enai-backend:${{ inputs.git_ref }} | gzip -9 > artifacts/backend-image.tar.gz
          else
            printf '%s\n' 'backend image was not produced; inspect the failed build step' \
              > artifacts/backend-image-build-failed.txt
          fi
          sha256sum artifacts/* > artifacts/SHA256SUMS

      - name: Upload immutable evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-${{ inputs.environment }}-${{ inputs.git_ref }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      # These MUST equal the os.environ.setdefault defaults used across
      # tests/ — the suite treats them as the canonical test environment
      # (tests mint gateway keys and session tokens with these literals,
      # and config/auth modules capture them at import). Divergent values
      # here 401 every /ask contract test; see the 2026-07-19 full-test
      # gate failure at 79c20da.
      SUPABASE_DB_URL: postgresql://user:pass@localhost/db
      ENAI_GATEWAY_SECRET: test-gateway-key
      ENAI_SESSION_SIGNING_SECRET: test-session-key
      ENAI_EVALUATE_SECRET: test-evaluate-key
      MODEL_TYPE: openai
      OPENAI_API_KEY: test-openai-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes --only-binary :all: -r requirements-lock.txt
          pip install -r requirements-dev.txt

      - name: Verify requirements lock is current
        run: python scripts/generate_requirements_lock.py --check

      # F10-SEC-01 B2.A.6: required advisory gate over the exact production
      # closure. Fails on ANY advisory (stricter than the Critical/High
      # minimum). A waiver is expressed as a narrowly scoped, documented
      # --ignore-vuln <ID> flag whose ID matches the waiver ledger — never by
      # removing this step.
      - name: Audit production dependency closure
        run: pip-audit --requirement requirements-lock.txt --no-deps

      - name: Lint (ruff)
        run: ruff check .

      - name: Run security adversarial suite
        run: pytest -q tests/security

      - name: Run formal red-team score gate
        run: python -m guardrails.redteam_gate --min-score 0.92 --min-block-rate 1.0 --max-false-block-rate 0.02 --min-grounding-detect-rate 1.0 --min-grounding-accept-rate 1.0

      - name: Enforce focused state and database-boundary coverage
        run: pytest -q tests/test_rate_limit_repository.py tests/test_p7_runtime_hardening.py --cov=utils.rate_limits --cov=core.query_executor --cov-report=term-missing --cov-fail-under=95

      # Coverage floor: production-code coverage measured at 82.11% on 2026-07-15
      # (1,549 tests; tests/scripts omitted via [tool.coverage.run] in pyproject.toml).
      # Raise the floor as coverage improves; never lower it to make a PR pass.
      - name: Run full tests with coverage floor
        run: pytest -q --cov=. --cov-report=term --cov-fail-under=80

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long (handled by formatter)
    "F401",  # unused import (some re-exports are intentional)
    "E402",  # module level import not at top (test files need env setup first)
]

[tool.ruff.lint.isort]
known-first-party = [
    "agent", "analysis", "config", "context", "contracts", "core",
    "knowledge", "models", "skills", "utils", "visualization",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"

[tool.coverage.run]
# Measure production code only — test files and operational scripts would
# inflate the number (test code is ~100% executed by definition).
omit = [
    "tests/*",
    "scripts/*",
    "evaluation_engine.py",
    "evaluation/*",
    "ingest_all_documents.py",
    "ingest_one_document.py",
    "verify_b1_migration.py",
]

[tool.coverage.report]
skip_covered = false
show_missing = false

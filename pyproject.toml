[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long (handled by formatter)
    "F401",  # unused import (some re-exports are intentional)
    "E402",  # module level import not at top (test files need env setup first)
]

[tool.ruff.lint.isort]
known-first-party = [
    "agent", "analysis", "config", "context", "contracts", "core",
    "knowledge", "models", "skills", "utils", "visualization",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
